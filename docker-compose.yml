services:
  # Infrastructure Only (Redis and RabbitMQ)
  # Database is now local (flexyride_db)
  
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

# Note: web, celery, and db have been moved to host-side execution for performance.
# To run the app, use 'python manage.py runserver' and 'celery' locally.

volumes:
  postgres_data:
