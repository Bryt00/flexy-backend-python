components:
  schemas:
    CategoryEnum:
      enum:
      - standard
      - comfort
      - luxury
      - delivery
      - pragya
      - motorbike
      type: string
      description: |-
        * `standard` - Standard
        * `comfort` - Comfort
        * `luxury` - Luxury
        * `delivery` - Delivery
        * `pragya` - Pragya (Tricycle)
        * `motorbike` - Motorbike
    DriverVerification:
      type: object
      properties:
        driver:
          type: string
          format: uuid
        license_number:
          type: string
          nullable: true
          maxLength: 50
        license_image_url:
          type: string
          nullable: true
        id_card_image_url:
          type: string
          nullable: true
        insurance_url:
          type: string
          nullable: true
        roadworthy_url:
          type: string
          nullable: true
        vehicle_video_url:
          type: string
          nullable: true
        status:
          $ref: '#/components/schemas/DriverVerificationStatusEnum'
        is_verified:
          type: boolean
        verified_at:
          type: string
          format: date-time
          nullable: true
        rejected_reason:
          type: string
          nullable: true
      required:
      - driver
    DriverVerificationRequest:
      type: object
      properties:
        driver:
          type: string
          format: uuid
        license_number:
          type: string
          nullable: true
          maxLength: 50
        license_image_url:
          type: string
          nullable: true
        id_card_image_url:
          type: string
          nullable: true
        insurance_url:
          type: string
          nullable: true
        roadworthy_url:
          type: string
          nullable: true
        vehicle_video_url:
          type: string
          nullable: true
        status:
          $ref: '#/components/schemas/DriverVerificationStatusEnum'
        is_verified:
          type: boolean
        verified_at:
          type: string
          format: date-time
          nullable: true
        rejected_reason:
          type: string
          nullable: true
      required:
      - driver
    DriverVerificationStatusEnum:
      enum:
      - PENDING
      - SUBMITTED
      - VERIFIED
      - REJECTED
