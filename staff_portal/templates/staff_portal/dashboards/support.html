{% extends 'staff_portal/base.html' %}

{% block title %}Live Operations - FlexyRide{% endblock %}

{% block content %}
<div class="absolute top-16 left-0 w-full h-[calc(100vh-4rem)] overflow-hidden">
    <!-- Map Container -->
    <div id="liveMap" class="w-full h-full bg-slate-800 z-0"></div>
    
    <!-- Live Map Loader -->
    <div id="live-map-loader" class="h-full w-full bg-black/60 flex flex-col items-center justify-center absolute z-20 top-0 left-0">
        <div class="w-10 h-10 border-4 border-white/10 border-t-brand-green rounded-full animate-spin mb-4"></div>
        <p class="text-white/50 font-mono text-xs uppercase tracking-widest animate-pulse">Initializing Live View...</p>
    </div>

    <!-- Floating UI Overlay -->
    <div class="absolute inset-0 z-10 p-6 flex flex-col justify-between pointer-events-none">
        <!-- Top Bar -->
        <div class="flex justify-between items-start w-full">
            <div class="glass-panel p-4 rounded-xl pointer-events-auto shadow-lg bg-slate-950/80 border border-slate-800 backdrop-blur-md">
                <h2 class="text-xl font-outfit font-bold tracking-tight flex items-center gap-2">
                    <span class="w-2.5 h-2.5 rounded-full bg-[#A3E635] animate-ping"></span>
                    Live Operations Map
                </h2>
                <p class="text-white/55 text-[10px] uppercase tracking-widest font-mono mt-0.5">Real-time Vehicle Tracking</p>
            </div>
            
            <div class="pointer-events-auto">
                <button onclick="window.location.reload();" class="cyber-button text-xs px-4 py-2.5 shadow-lg bg-slate-950/80 border border-slate-800 backdrop-blur-md">
                    Refresh Data
                </button>
            </div>
        </div>

        <!-- Bottom Row (Sidebar Panel for Active Rides) -->
        <div class="flex justify-end items-end w-full">
            <div class="glass-panel p-5 rounded-2xl w-80 pointer-events-auto shadow-2xl bg-slate-950/85 border border-slate-800 backdrop-blur-md max-h-[300px] flex flex-col">
                <h3 class="text-sm font-outfit font-black tracking-widest text-primary uppercase mb-3">Active Rides</h3>
                <ul id="activeRidesList" class="space-y-2 overflow-y-auto flex-1 pr-1 font-sans">
                    <!-- Populated via JS -->
                </ul>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
<script>
    const activeRides = JSON.parse('{{ active_rides_json|escapejs }}');
    const rideTrackers = {}; // Keyed by driver_id
    
    // Focus and routing tracking
    let focusedRideId = null;
    let focusedPickupMarker = null;
    let focusedDropoffMarker = null;
    let focusedRouteLine = null;
    
    // Initialize Leaflet Map
    const map = L.map('liveMap', { zoomControl: false }).setView([5.6037, -0.1870], 12);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; OpenStreetMap contributors &copy; CARTO'
    }).addTo(map);

    // Initialize Marker Cluster Group
    const markerClusterGroup = L.markerClusterGroup({
        maxClusterRadius: 50
    });
    map.addLayer(markerClusterGroup);

    // Place zoom control in bottomleft to prevent overlay conflicts
    L.control.zoom({ position: 'bottomleft' }).addTo(map);
 
    const listContainer = document.getElementById('activeRidesList');

    function getElapsedString(lastTimeStr) {
        if (!lastTimeStr) return { str: 'Unknown', stale: true };
        const lastTime = new Date(lastTimeStr);
        const now = new Date();
        const diffMs = now - lastTime;
        const diffMin = Math.max(0, Math.floor(diffMs / 60000));
        if (diffMin < 1) {
            return { str: 'Just now', stale: false };
        } else if (diffMin < 60) {
            return { str: `${diffMin}m ago`, stale: diffMin >= 5 };
        } else {
            const diffHrs = Math.floor(diffMin / 60);
            return { str: `${diffHrs}h ago`, stale: true };
        }
    }

    function animateMarker(marker, startLatLng, endLatLng, duration = 800) {
        const start = performance.now();
        function step(timestamp) {
            const elapsed = timestamp - start;
            const progress = Math.min(elapsed / duration, 1);
            const currentLat = startLatLng[0] + (endLatLng[0] - startLatLng[0]) * progress;
            const currentLng = startLatLng[1] + (endLatLng[1] - startLatLng[1]) * progress;
            marker.setLatLng([currentLat, currentLng]);
            if (progress < 1) {
                requestAnimationFrame(step);
            }
        }
        requestAnimationFrame(step);
    }



    function focusOnRide(rideId) {
        // Clear previous focused elements
        if (focusedPickupMarker) map.removeLayer(focusedPickupMarker);
        if (focusedDropoffMarker) map.removeLayer(focusedDropoffMarker);
        if (focusedRouteLine) map.removeLayer(focusedRouteLine);

        // If clicking the currently focused ride, toggle/unfocus it
        if (focusedRideId === rideId) {
            focusedRideId = null;
            // Reset to fit all active driver markers
            if (markerClusterGroup.getBounds().isValid()) {
                map.fitBounds(markerClusterGroup.getBounds(), { padding: [40, 40] });
            }
            // Remove highlight class from list item
            Object.keys(rideTrackers).forEach(id => {
                const item = rideTrackers[id].listItem;
                item.classList.remove('border-primary/50', 'bg-primary/10');
            });
            return;
        }

        focusedRideId = rideId;

        // Find the tracker
        const driverId = Object.keys(rideTrackers).find(dId => rideTrackers[dId].ride.id === rideId);
        if (!driverId) return;

        const tracker = rideTrackers[driverId];
        const ride = tracker.ride;
        const driverLatLng = tracker.marker.getLatLng();

        // Highlight list item and dim others
        Object.keys(rideTrackers).forEach(id => {
            const item = rideTrackers[id].listItem;
            if (id === driverId) {
                item.classList.add('border-primary/50', 'bg-primary/10');
            } else {
                item.classList.remove('border-primary/50', 'bg-primary/10');
            }
        });

        // Add Pickup Marker
        const pickupIcon = L.divIcon({
            html: `<div style="background-color: #A3E635; color: black; font-weight: 900; font-size: 9px; width: 22px; height: 22px; border-radius: 50%; border: 2px solid white; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 8px rgba(0,0,0,0.5);">P</div>`,
            className: '',
            iconSize: [22, 22],
            iconAnchor: [11, 11]
        });
        focusedPickupMarker = L.marker([ride.pickup_lat, ride.pickup_lng], { icon: pickupIcon }).addTo(map);
        focusedPickupMarker.bindPopup(`<b>Pickup Location</b><br><span class="text-xs text-slate-500">${ride.rider_name || 'Rider'}'s pickup spot</span>`);

        // Add Dropoff Marker
        const dropoffIcon = L.divIcon({
            html: `<div style="background-color: #EF4444; color: white; font-weight: 900; font-size: 9px; width: 22px; height: 22px; border-radius: 50%; border: 2px solid white; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 8px rgba(0,0,0,0.5);">D</div>`,
            className: '',
            iconSize: [22, 22],
            iconAnchor: [11, 11]
        });
        focusedDropoffMarker = L.marker([ride.dropoff_lat, ride.dropoff_lng], { icon: dropoffIcon }).addTo(map);
        focusedDropoffMarker.bindPopup(`<b>Dropoff Location</b><br><span class="text-xs text-slate-500">Destination</span>`);

        // Add Polyline connecting route (Pickup -> Driver -> Dropoff)
        focusedRouteLine = L.polyline([
            [ride.pickup_lat, ride.pickup_lng],
            [driverLatLng.lat, driverLatLng.lng],
            [ride.dropoff_lat, ride.dropoff_lng]
        ], {
            color: '#00B4FF',
            dashArray: '6, 8',
            weight: 3.5,
            opacity: 0.85
        }).addTo(map);

        // Zoom map to fit the route bounds
        const bounds = L.latLngBounds([
            [ride.pickup_lat, ride.pickup_lng],
            [driverLatLng.lat, driverLatLng.lng],
            [ride.dropoff_lat, ride.dropoff_lng]
        ]);
        map.fitBounds(bounds, { padding: [50, 50] });
    }

    function createOrUpdateRideTracker(ride, newLat = null, newLng = null, isUpdate = false) {
        const driverId = ride.driver_id;
        if (!driverId) return;

        const name = ride.rider_name || 'Rider';
        const lat = newLat || ride.last_lat_update || ride.pickup_lat;
        const lng = newLng || ride.last_lng_update || ride.pickup_lng;
        
        let lastTimeStr = ride.last_tracking_time || ride.driver__profile__last_location_update;
        if (isUpdate) {
            lastTimeStr = new Date().toISOString();
            ride.last_tracking_time = lastTimeStr;
        }

        const elapsed = getElapsedString(lastTimeStr);
        const pinColor = elapsed.stale ? '#f97316' : '#A3E635';
        const statusPillClass = elapsed.stale ? 'status-pill-warning' : 'status-pill-success';
        const statusText = elapsed.stale ? 'Stale' : 'Live';

        if (!lat || !lng) return;

        // Custom icon
        const icon = L.divIcon({
            html: `<div style="background-color: ${pinColor}; width: 16px; height: 16px; border-radius: 50%; border: 2px solid white; box-shadow: 0 0 8px rgba(0,0,0,0.5);"></div>`,
            className: '',
            iconSize: [16, 16],
            iconAnchor: [8, 8]
        });

        let tracker = rideTrackers[driverId];

        if (!tracker) {
            // Create Marker
            const marker = L.marker([lat, lng], {icon: icon});
            marker.on('click', () => {
                focusOnRide(ride.id);
            });
            marker.bindPopup(`
                <div class="text-slate-900 font-sans p-1">
                    <b class="text-sm">${name}</b><br>
                    <span class="text-xs text-slate-500">ID: ${ride.id.substring(0,8)}</span><br>
                    <span class="text-xs font-bold text-slate-700 seen-time">Seen: ${elapsed.str}</span>
                </div>
            `);

            // Create list item DOM
            const li = document.createElement('li');
            li.className = 'flex items-center justify-between p-3 bg-white/5 rounded-lg border border-white/5 transition-all duration-300 cursor-pointer hover:bg-white/10 hover:border-primary/30';
            li.innerHTML = `
                <div class="flex items-center">
                    <div class="w-8 h-8 rounded-full bg-brand-green/20 text-brand-green flex items-center justify-center font-bold text-xs mr-3">
                        ${name.charAt(0).toUpperCase()}
                    </div>
                    <div>
                        <p class="text-sm font-bold text-white">${name}</p>
                        <p class="text-[10px] text-white/40 elapsed-label">Last seen: ${elapsed.str}</p>
                        <p class="text-[10px] text-white/50 font-mono">ID: ${ride.id.substring(0, 8)}...</p>
                    </div>
                </div>
                <span class="status-pill ${statusPillClass}">${statusText}</span>
            `;
            li.addEventListener('click', () => {
                focusOnRide(ride.id);
            });
            listContainer.appendChild(li);

            // Add marker to the cluster group
            markerClusterGroup.addLayer(marker);

            rideTrackers[driverId] = {
                ride: ride,
                marker: marker,
                listItem: li,
                lastSeen: lastTimeStr
            };
        } else {
            // Update existing tracker
            tracker.ride = ride;
            
            // Animate marker transition smoothly instead of snapping it instantly
            const startLatLng = [tracker.marker.getLatLng().lat, tracker.marker.getLatLng().lng];
            const endLatLng = [lat, lng];
            animateMarker(tracker.marker, startLatLng, endLatLng);
            
            tracker.marker.setIcon(icon);
            tracker.marker.getPopup().setContent(`
                <div class="text-slate-900 font-sans p-1">
                    <b class="text-sm">${name}</b><br>
                    <span class="text-xs text-slate-500">ID: ${ride.id.substring(0,8)}</span><br>
                    <span class="text-xs font-bold text-slate-700 seen-time">Seen: ${elapsed.str}</span>
                </div>
            `);

            // If currently focused, update route line coordinates
            if (focusedRideId === ride.id) {
                if (focusedRouteLine) {
                    focusedRouteLine.setLatLngs([
                        [ride.pickup_lat, ride.pickup_lng],
                        [lat, lng],
                        [ride.dropoff_lat, ride.dropoff_lng]
                    ]);
                }
            }

            // Update list item
            const elapsedLabel = tracker.listItem.querySelector('.elapsed-label');
            if (elapsedLabel) {
                elapsedLabel.textContent = `Last seen: ${elapsed.str}`;
            }
            const statusPill = tracker.listItem.querySelector('.status-pill');
            if (statusPill) {
                statusPill.className = `status-pill ${statusPillClass}`;
                statusPill.textContent = statusText;
            }

            // Highlight list item briefly to show activity if not currently focused
            if (focusedRideId !== ride.id) {
                tracker.listItem.classList.remove('bg-white/5');
                tracker.listItem.classList.add('bg-primary/20');
                setTimeout(() => {
                    if (focusedRideId !== ride.id) {
                        tracker.listItem.classList.remove('bg-primary/20');
                        tracker.listItem.classList.add('bg-white/5');
                    }
                }, 1000);
            }
        }
    }

    // Initialize list & markers
    setTimeout(() => {
        document.getElementById('live-map-loader').style.display = 'none';
        
        if (activeRides.length === 0) {
            listContainer.innerHTML = '<li id="noRidesMessage" class="text-white/50 text-sm text-center py-4">No active rides at the moment.</li>';
        } else {
            activeRides.forEach(ride => {
                createOrUpdateRideTracker(ride);
            });
        }

        // Establish WebSocket connection
        const wsScheme = window.location.protocol === "https:" ? "wss" : "ws";
        const wsUrl = `${wsScheme}://${window.location.host}/ws/rides/global/`;
        console.log("Connecting to Global Rides WebSocket...");
        
        let socket = null;
        function connectWs() {
            socket = new WebSocket(wsUrl);

            socket.onopen = function() {
                console.log("Global Rides WebSocket connected.");
            };

            socket.onmessage = function(e) {
                try {
                    const data = JSON.parse(e.data);
                    console.log("Location update received via WebSocket:", data);
                    
                    const driverId = data.driver_id;
                    const lat = data.lat;
                    const lng = data.lng;

                    // Find if there is an active tracker for this driver
                    let tracker = rideTrackers[driverId];
                    if (tracker) {
                        createOrUpdateRideTracker(tracker.ride, lat, lng, true);
                    } else {
                        // Try to find the ride in activeRides if not tracked yet
                        const ride = activeRides.find(r => r.driver_id === driverId);
                        if (ride) {
                            const noMsg = document.getElementById('noRidesMessage');
                            if (noMsg) noMsg.remove();
                            createOrUpdateRideTracker(ride, lat, lng, true);
                        }
                    }
                } catch (err) {
                    console.error("Error parsing WebSocket location data:", err);
                }
            };

            socket.onclose = function(e) {
                console.warn("Global Rides WebSocket closed. Reconnecting in 3s...", e.reason);
                setTimeout(connectWs, 3000);
            };

            socket.onerror = function(err) {
                console.error("Global Rides WebSocket error:", err);
                socket.close();
            };
        }

        connectWs();

        // Periodically update elapsed time labels (every 10s)
        setInterval(() => {
            Object.keys(rideTrackers).forEach(driverId => {
                const tracker = rideTrackers[driverId];
                createOrUpdateRideTracker(tracker.ride);
            });
        }, 10000);

    }, 800);
</script>
{% endblock %}
