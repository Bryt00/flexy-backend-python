<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: 'Outfit', 'Inter', sans-serif; background-color: #f4f7f6; margin: 0; padding: 0; }
        .container { max-width: 500px; margin: 40px auto; background: #ffffff; border-radius: 12px; overflow: hidden; border: 1px solid #e2e8f0; }
        .header { padding: 30px; text-align: center; color: #1e293b; border-bottom: 1px solid #f1f5f9; }
        .content { padding: 40px; text-align: center; }
        .otp-code { font-size: 32px; font-weight: 700; color: #00B4FF; letter-spacing: 4px; background: #f8fafc; padding: 20px; border-radius: 8px; margin: 20px 0; }
        .footer { padding: 20px; text-align: center; color: #94a3b8; font-size: 13px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>Verification Code</h2>
        </div>
        <div class="content">
            <p>Your FlexyRide verification code is:</p>
            <div class="otp-code">{{ otp_code }}</div>
            <p style="color: #64748b; font-size: 14px;">This code expires in {{ expires_in }}. If you didn't request this, you can safely ignore it.</p>
        </div>
        <div class="footer">
            &copy; 2026 FlexyRide Ltd.
        </div>
    </div>
</body>
</html>
