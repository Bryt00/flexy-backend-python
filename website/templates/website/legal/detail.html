{% extends 'website/base.html' %}
{% load static %}

{% block title %}{{ document.title }} | FlexyRide{% endblock %}

{% block content %}
<section class="container animate-fade-in mb-32">
    <div class="max-w-4xl mx-auto">
        <div class="mb-12">
            <h1 class="text-5xl font-bold mb-4">{{ document.title }}</h1>
            <p class="text-gray-500 text-sm">Last updated: {{ document.last_updated|date:"F d, Y" }}</p>
        </div>
        
        <div class="ui-card p-12 prose prose-invert prose-brand max-w-none">
            {{ document.content|safe }}
        </div>
    </div>
</section>
{% endblock %}

{% block extra_css %}
<style>
    /* Basic prose styling for CKEditor content in dark mode */
    .prose h2 { @apply text-2xl font-bold mt-12 mb-6 text-white border-b border-white/10 pb-4; }
    .prose h3 { @apply text-xl font-bold mt-8 mb-4 text-brand; }
    .prose p { @apply text-gray-400 mb-6 leading-relaxed; }
    .prose ul, .prose ol { @apply mb-8 ml-6; }
    .prose li { @apply text-gray-400 mb-3; }
    .prose strong { @apply text-white; }
</style>
{% endblock %}
